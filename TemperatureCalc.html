<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Converter</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(to right, #4facfe, #00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    width:350px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    color:#333;
    margin-bottom:20px;
}

input, select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#45F5C8;
}

#result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
    color:#333;
}
</style>
</head>

<body>

<div class="container">
    <h1>Temperature Converter</h1>

    <input type="text" id="temp" placeholder="Enter temperature">

    <select id="unit">
        <option value="C">Celsius (°C)</option>
        <option value="F">Fahrenheit (°F)</option>
        <option value="K">Kelvin (K)</option>
    </select>

    <button onclick="convertTemp()">Convert</button>

    <div id="result"></div>
</div>

<script>
function convertTemp() {

    let temp = document.getElementById("temp").value;
    let unit = document.getElementById("unit").value;
    let result = document.getElementById("result");

    if (isNaN(temp) || temp === "") {
        result.innerHTML = "Please enter a valid number!";
        return;
    }

    temp = parseFloat(temp);

    let celsius, fahrenheit, kelvin;

    if (unit === "C") {
        fahrenheit = (temp * 9/5) + 32;
        kelvin = temp + 273.15;

        result.innerHTML =
        temp + " °C = " +
        fahrenheit.toFixed(2) + " °F <br>" +
        kelvin.toFixed(2) + " K";
    }

    else if (unit === "F") {
        celsius = (temp - 32) * 5/9;
        kelvin = celsius + 273.15;

        result.innerHTML =
        temp + " °F = " +
        celsius.toFixed(2) + " °C <br>" +
        kelvin.toFixed(2) + " K";
    }

    else {
        celsius = temp - 273.15;
        fahrenheit = (celsius * 9/5) + 32;

        result.innerHTML =
        temp + " K = " +
        celsius.toFixed(2) + " °C <br>" +
        fahrenheit.toFixed(2) + " °F";
    }
}
</script>

</body>
</html>
